document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>clide — current code as wireframe<\u002Ftitle>\n\n<style>\n  :root {\n    --paper: #f4f1ea;\n    --paper-2: #ece7db;\n    --ink: #1a1a1a;\n    --ink-2: #4a4a4a;\n    --ink-3: #8a8a82;\n    --accent: #c14b2a;       /* red pencil for annotations */\n    --rule: #1a1a1a;\n  }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--paper);\n    color: var(--ink);\n    font-family: \"IBM Plex Mono\", \"JetBrains Mono\", ui-monospace, Menlo, Consolas, monospace;\n    font-size: 12px;\n    line-height: 1.4;\n  }\n\n  /* page chrome — a \"drafting sheet\" */\n  .sheet {\n    max-width: 1360px;\n    margin: 32px auto 80px;\n    padding: 28px 36px 36px;\n    background: var(--paper);\n    border: 1.5px solid var(--ink);\n    position: relative;\n  }\n  .sheet::before {\n    /* drafting grid, very faint */\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(to right, rgba(26,26,26,0.04) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(26,26,26,0.04) 1px, transparent 1px);\n    background-size: 16px 16px;\n    pointer-events: none;\n  }\n\n  .titleblock {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    border-bottom: 1px solid var(--ink);\n    padding-bottom: 10px;\n    margin-bottom: 24px;\n    position: relative;\n  }\n  .titleblock h1 {\n    font-family: \"Josefin Sans\", \"Helvetica Neue\", sans-serif;\n    font-weight: 300;\n    font-size: 34px;\n    margin: 0;\n    letter-spacing: 0.02em;\n  }\n  .titleblock h1 em {\n    font-style: normal;\n    color: var(--ink-3);\n    font-weight: 300;\n  }\n  .titleblock .meta {\n    font-size: 11px;\n    color: var(--ink-2);\n    text-align: right;\n    line-height: 1.6;\n  }\n  .titleblock .meta b { color: var(--ink); font-weight: 500; }\n\n  .caption {\n    font-size: 11px;\n    color: var(--ink-2);\n    margin: -8px 0 20px;\n    max-width: 900px;\n  }\n\n  /* ---------- wireframe app frame ---------- */\n  .app {\n    width: 100%;\n    height: 720px;\n    border: 1.5px solid var(--ink);\n    display: grid;\n    grid-template-columns: 240px 6px 1fr 6px 280px;\n    grid-template-rows: 1fr 26px;\n    position: relative;\n    background: var(--paper);\n  }\n\n  /* drag resize handles */\n  .gutter {\n    grid-row: 1;\n    background:\n      repeating-linear-gradient(\n        to bottom,\n        var(--ink) 0 4px,\n        transparent 4px 8px\n      );\n    opacity: 0.35;\n  }\n  .gutter.g1 { grid-column: 2; }\n  .gutter.g2 { grid-column: 4; }\n\n  .slot {\n    border-right: 1px solid var(--ink);\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n  }\n  .slot:last-of-type { border-right: 0; }\n\n  .sidebar  { grid-column: 1; grid-row: 1; }\n  .workspace { grid-column: 3; grid-row: 1; border-right: 0; border-left: 0; }\n  .context  { grid-column: 5; grid-row: 1; border-right: 0; border-left: 0; }\n\n  /* tab bar */\n  .tabbar {\n    display: flex;\n    align-items: stretch;\n    border-bottom: 1px solid var(--ink);\n    background: var(--paper-2);\n    min-height: 28px;\n  }\n  .tab {\n    padding: 6px 12px;\n    font-size: 11px;\n    border-right: 1px solid var(--ink);\n    color: var(--ink-2);\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    white-space: nowrap;\n  }\n  .tab.active {\n    background: var(--paper);\n    color: var(--ink);\n    border-bottom: 2px solid var(--ink);\n    margin-bottom: -1px;\n    position: relative;\n  }\n  .tab .dot {\n    display: inline-block;\n    width: 5px; height: 5px; border-radius: 50%;\n    background: var(--ink-3);\n  }\n  .tab.active .dot { background: var(--ink); }\n  .tab .prio {\n    color: var(--ink-3);\n    font-size: 10px;\n    opacity: 0.8;\n  }\n\n  .paneheader {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    padding: 8px 12px 4px;\n    border-bottom: 1px dashed var(--ink-3);\n  }\n  .paneheader .ptitle { font-size: 12px; }\n  .paneheader .psub { font-size: 10px; color: var(--ink-3); }\n  .paneheader .pclose { font-size: 10px; color: var(--ink-3); }\n\n  .body {\n    flex: 1;\n    padding: 10px 12px;\n    overflow: hidden;\n    position: relative;\n  }\n\n  /* generic placeholder block with diagonal hatch */\n  .hatch {\n    background:\n      repeating-linear-gradient(\n        135deg,\n        rgba(26,26,26,0.07) 0 6px,\n        transparent 6px 12px\n      );\n    border: 1px dashed var(--ink-3);\n  }\n\n  /* ---------- sidebar list rows ---------- */\n  .section-hdr {\n    font-size: 10px;\n    color: var(--ink-3);\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    margin: 6px 0 4px;\n  }\n  .row {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    font-size: 11px;\n    padding: 2px 0 2px 0;\n    color: var(--ink);\n  }\n  .row .chev { width: 8px; color: var(--ink-3); font-size: 10px; }\n  .row .ico { width: 10px; color: var(--ink-3); }\n  .row.muted { color: var(--ink-3); }\n  .row .gs { /* git state marker */\n    display: inline-block; width: 10px; text-align: center;\n    font-weight: 700;\n  }\n  .gs.M { color: #2a6fc1; }\n  .gs.A, .gs.U { color: #2d8a52; }\n  .gs.D { color: #b03a2a; }\n\n  .indent-1 { padding-left: 14px; }\n  .indent-2 { padding-left: 28px; }\n  .indent-3 { padding-left: 42px; }\n\n  /* ---------- workspace: claude pane ---------- */\n  .claude {\n    display: flex;\n    flex-direction: column;\n    flex: 1;\n    gap: 0;\n  }\n  .term {\n    flex: 1;\n    background: #111;\n    color: #ededed;\n    padding: 10px 12px;\n    font-family: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n    font-size: 11px;\n    line-height: 1.5;\n    overflow: hidden;\n    position: relative;\n  }\n  .term .prompt { color: #a3c4ff; }\n  .term .ok { color: #8fdc9b; }\n  .term .warn { color: #e0c170; }\n  .term .dim { color: #8a8a82; }\n  .term .cursor {\n    display: inline-block;\n    width: 7px; height: 12px;\n    background: #ededed;\n    vertical-align: -2px;\n    animation: blink 1s steps(2) infinite;\n  }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  /* ---------- context panel (links) ---------- */\n  .links-title {\n    font-size: 11px;\n    color: var(--ink);\n    padding-bottom: 8px;\n    border-bottom: 1px dashed var(--ink-3);\n    margin-bottom: 8px;\n  }\n\n  /* ---------- statusbar ---------- */\n  .statusbar {\n    grid-column: 1 / -1;\n    grid-row: 2;\n    border-top: 1px solid var(--ink);\n    background: var(--paper-2);\n    display: flex;\n    align-items: center;\n    padding: 0 10px;\n    font-size: 10px;\n    color: var(--ink-2);\n    gap: 16px;\n  }\n  .statusbar .spacer { flex: 1; }\n  .statusbar .item { display: inline-flex; gap: 6px; align-items: center; }\n  .statusbar .plug {\n    display: inline-block;\n    width: 8px; height: 8px; border-radius: 50%;\n    background: #2d8a52;\n  }\n\n  /* ---------- annotations (red pencil) ---------- */\n  .anno {\n    position: absolute;\n    color: var(--accent);\n    font-family: \"Caveat\", \"Kalam\", \"Bradley Hand\", cursive;\n    font-size: 15px;\n    line-height: 1.15;\n    max-width: 220px;\n    pointer-events: none;\n  }\n  .anno .tag {\n    display: inline-block;\n    border: 1.5px solid var(--accent);\n    padding: 0 6px;\n    border-radius: 10px;\n    font-family: \"IBM Plex Mono\", monospace;\n    font-size: 10px;\n    margin-right: 4px;\n    color: var(--accent);\n  }\n\n  /* arrow helper */\n  .arrow {\n    position: absolute;\n    stroke: var(--accent);\n    fill: none;\n    stroke-width: 1.5;\n  }\n\n  .dim-text { color: var(--ink-3); }\n\n  /* legend */\n  .legend {\n    margin-top: 24px;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px 24px;\n    border-top: 1px solid var(--ink);\n    padding-top: 18px;\n  }\n  .legend h3 {\n    font-family: \"Josefin Sans\", sans-serif;\n    font-weight: 400;\n    font-size: 14px;\n    margin: 0 0 8px;\n    letter-spacing: 0.04em;\n  }\n  .legend ul { margin: 0; padding-left: 14px; }\n  .legend li { font-size: 11px; color: var(--ink-2); margin-bottom: 3px; }\n  .legend code {\n    font-family: inherit;\n    color: var(--ink);\n    background: var(--paper-2);\n    padding: 0 3px;\n  }\n\n  /* coord labels on gutters */\n  .size-label {\n    position: absolute;\n    top: -16px;\n    font-size: 10px;\n    color: var(--ink-3);\n    font-family: \"IBM Plex Mono\", monospace;\n  }\n\n  /* top dimension rule */\n  .rule-top {\n    height: 18px;\n    position: relative;\n    margin-bottom: 4px;\n    font-size: 10px;\n    color: var(--ink-3);\n  }\n  .rule-top .seg {\n    position: absolute;\n    border-top: 1px solid var(--ink-3);\n    border-left: 1px solid var(--ink-3);\n    border-right: 1px solid var(--ink-3);\n    height: 8px;\n    top: 10px;\n    display: flex;\n    align-items: flex-start;\n    justify-content: center;\n  }\n  .rule-top .seg span {\n    background: var(--paper);\n    padding: 0 6px;\n    transform: translateY(-8px);\n  }\n\n  /* badges for contribution pts */\n  .badge {\n    display: inline-block;\n    font-size: 9px;\n    color: var(--ink-3);\n    border: 1px solid var(--ink-3);\n    border-radius: 8px;\n    padding: 0 5px;\n    margin-left: 6px;\n    vertical-align: 1px;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"sheet\">\n    <div class=\"titleblock\">\n      <div>\n        <h1>clide <em>— current code, as wireframe<\u002Fem><\u002Fh1>\n        <div style=\"font-size:11px;color:var(--ink-2);margin-top:6px;\">\n          Flutter desktop IDE for Claude Code · <b>classicPreset<\u002Fb> layout ·\n          builtins rendered at their contributed tabs &amp; priorities\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <div>source &nbsp;·&nbsp; <b>app/lib/app.dart<\u002Fb><\u002Fdiv>\n        <div>layout &nbsp;·&nbsp; <b>builtin.default-layout.classic<\u002Fb><\u002Fdiv>\n        <div>version &nbsp;·&nbsp
