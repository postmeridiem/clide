  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: 56px 40px 96px; }\n\n  h1 { font-family: 'Josefin Sans', sans-serif; font-weight: 300; font-size: 52px; margin: 0 0 4px; letter-spacing: 0.02em; }\n  .sub { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }\n  .tagline { color: var(--text-mute); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 48px; }\n\n  h2 { font-family:'Josefin Sans', sans-serif; font-weight: 400; font-size: 24px; margin: 56px 0 8px; letter-spacing: 0.02em; }\n  .secno { color: var(--text-mute); font-size: 10px; letter-spacing: 0.16em; margin-bottom: 16px; }\n  .rule { border-top: 1px solid var(--border); margin: 8px 0 20px; }\n\n  /* ── theme grid ─────────────────────────────────────────── */\n  .themes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n  .theme-card { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--bg-sunken); }\n  .theme-card .bar { height: 42px; display: flex; align-items: center; padding: 0 14px; border-bottom: 1px solid var(--border); font-family:'Josefin Sans'; font-weight: 400; font-size: 18px; }\n  .theme-card .bar .tag { margin-left: auto; font-family:'JetBrains Mono'; font-size: 10px; color: var(--text-mute); letter-spacing: 0.12em; }\n  .theme-card .swatches { display: grid; grid-template-columns: repeat(6,1fr); }\n  .theme-card .swatches div { height: 40px; position: relative; }\n  .theme-card .swatches div span { position: absolute; inset: auto 4px 3px 4px; font-size: 8px; color: rgba(255,255,255,0.5); font-family:'JetBrains Mono'; text-align: right; }\n  .theme-card.light .swatches div span { color: rgba(0,0,0,0.55); }\n  .theme-card .foot { padding: 10px 14px; font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); background: var(--bg); }\n\n  /* ── swatch matrix ──────────────────────────────────────── */\n  .matrix { display: grid; grid-template-columns: 180px repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }\n  .matrix .h, .matrix .c { background: var(--bg); padding: 10px 12px; }\n  .matrix .h { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mute); }\n  .matrix .c { font-size: 11px; }\n  .matrix .lbl { color: var(--text); }\n  .matrix .chip { display: flex; align-items: center; gap: 10px; }\n  .matrix .chip .dot { width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }\n  .matrix .chip .hex { font-size: 10px; color: var(--text-dim); }\n\n  /* ── type scale ─────────────────────────────────────────── */\n  .type-scale { display: grid; grid-template-columns: 1fr 180px; gap: 20px 32px; align-items: baseline; border-top: 1px solid var(--border); }\n  .type-scale .row { display: contents; }\n  .type-scale .sample { padding: 14px 0; border-bottom: 1px solid var(--border); color: var(--text-hi); }\n  .type-scale .spec  { padding: 14px 0; border-bottom: 1px solid var(--border); color: var(--text-mute); font-size: 10px; letter-spacing: 0.06em; text-align: right; font-family:'JetBrains Mono'; }\n\n  /* ── components ─────────────────────────────────────────── */\n  .comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }\n  .comp { background: var(--bg-sunken); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }\n  .comp h3 { margin: 0; padding: 10px 14px; border-bottom: 1px solid var(--border); font-family:'Josefin Sans'; font-weight: 400; font-size: 14px; color: var(--text-hi); letter-spacing: 0.04em; }\n  .comp .inner { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }\n  .comp .spec { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-mute); background: var(--bg); line-height: 1.6; }\n\n  /* real button styles */\n  .btn { font-family:'JetBrains Mono'; font-size: 11px; padding: 7px 12px; border-radius: 3px; border: 1px solid transparent; cursor: pointer; }\n  .btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }\n  .btn-primary:hover { background: var(--accent-press); border-color: var(--accent-press); }\n  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-hi); }\n  .btn-ghost:hover { background: var(--surface); color: var(--text-hi); }\n  .btn-danger { background: transparent; color: var(--err); border-color: var(--err); }\n  .btn-disabled { background: var(--surface); color: var(--text-mute); border-color: var(--border); cursor: not-allowed; }\n\n  .input { font-family:'JetBrains Mono'; font-size: 11px; padding: 7px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--text-hi); width: 240px; outline: none; }\n  .input:focus { border-color: var(--accent); }\n\n  .chip-pill { font-family:'JetBrains Mono'; font-size: 11px; color: var(--text); background: var(--surface); border: 1px solid var(--border-hi); padding: 3px 10px; border-radius: 3px; }\n  .chip-pill.accent { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }\n\n  .badge { font-family:'JetBrains Mono'; font-size: 10px; padding: 2px 7px; border-radius: 10px; }\n  .badge.ok { background: rgba(125,211,168,0.12); color: var(--ok); }\n  .badge.warn { background: rgba(230,195,112,0.12); color: var(--warn); }\n  .badge.err { background: rgba(232,125,125,0.12); color: var(--err); }\n  .badge.info { background: var(--accent-soft); color: var(--accent); }\n\n  /* tab-bar preview */\n  .tab-preview { display: flex; background: var(--bg-sunken); border-bottom: 1px solid var(--border); width: 100%; }\n  .tp-tab { padding: 6px 14px; font-size: 11px; color: var(--text-dim); border-right: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }\n  .tp-tab.on { color: var(--text-hi); background: var(--bg); border-top: 2px solid var(--accent); margin-top: -1px; }\n\n  /* code block */\n  pre.code { margin: 0; padding: 16px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family:'JetBrains Mono'; font-size: 12px; line-height: 1.55; overflow: auto; }\n  .kw { color: var(--syn-keyword); } .ty { color: var(--syn-type); }\n  .st { color: var(--syn-string); }  .nu { color: var(--syn-number); }\n  .cm { color: var(--syn-comment); } .me { color: var(--syn-method); }\n  .pu { color: var(--syn-punct); }\n\n  /* spacing / radius / shadow */\n  .tokens-line { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }\n  .tokens-line .tk { display: flex; flex-direction: column; align-items: center; gap: 6px; }\n  .tokens-line .tk .box { background: var(--accent-soft); border: 1px dashed var(--accent); }\n  .tokens-line .tk .label { font-size: 10px; color: var(--text-mute); font-family:'JetBrains Mono'; }\n\n  /* theme switcher */\n  .switcher { position: sticky; top: 16px; background: var(--surface); border: 1px solid var(--border-hi); border-radius: 6px; padding: 10px 14px; display: flex; gap: 8px; align-items: center; z-index: 20; margin-bottom: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }\n  .switcher .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mute); margin-right: 6px; }\n  .sw-btn { font-family:'JetBrains Mono'; font-size: 11px; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border); color: var(--text); background: var(--bg); cursor: pointer; }\n  .sw-btn.on { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }\n\n  /* usage footer */\n  .usage { margin-top: 48px; padding: 24px; background: var(--bg-sunken); border: 1px solid var(--border); border-radius: 6px; }\n  .usage h3 { font-family:'Josefin Sans'; font-weight: 400; font-size: 16px; margin: 0 0 10px; color: var(--text-hi); }\n  .usage code { background: var(--bg); padding: 1px 5px; border-radius: 2px; color: var(--accent); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"page\">\n    <h1>clide / design system<\u002Fh1>\n    <div class=\"sub\">Tokens, type, components and syntax across the four default themes.<\u002Fdiv>\n    <div class=\"tagline\">v 2.0.0-dev · Josefin Sans + JetBrains Mono · Flutter target<\u002Fdiv>\n\n    <div class=\"switcher\">\n      <span class=\"lbl\">theme<\u002Fspan>\n      <button class=\"sw-btn on\" data-t=\"clide\">Clide<\u002Fbutton>\n      <button class=\"sw-btn\" data-t=\"midnight\">Midnight<\u002Fbutton>\n      <button class=\"sw-btn\" data-t=\"paper\">Paper<\u002Fbutton>\n      <button class=\"sw-btn\" data-t=\"terminal\">Terminal<\u002Fbutton>\n      <span style=\"flex:1\"><\u002Fspan>\n      <span style=\"font-size:10px;color:var(--text-mute)\">page reflows live<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ───── themes at a glance ───── -->\n    <h2>Themes at a glance<\u002Fh2>\n    <div class=\"secno\">01 · four presets ship with clide<\u002Fdiv>\n    <div class=\"themes\" id=\"themeCards\"><\u002Fdiv>\n\n    <!-- ───── color tokens ───── -->\n    <h2>Color tokens<\u002Fh2>\n    <div class=\"secno\">02 · semantic roles → active theme's hex<\u002Fdiv>\n    <div class=\"matrix\" id=\"colorMatrix\"><\u002Fdiv>\n\n    <!-- ───── typography ───── -->\n    <h2>Typography<\u002Fh2>\n    <div class=\"secno\">03 · Josefin Sans for display, JetBrains Mono for body/code<\u002Fdiv>\n    <div class=\"type-scale\">\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'Josefin Sans';font-weight:300;font-size:48px;line-height:1.1;letter-spacing:0.02em\">clide — display<\u002Fdiv>\n        <div class=\"spec\">display/L · Josefin 300 · 48 / 1.1<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'Josefin Sans';font-weight:300;font-size:34px;line-height:1.15;letter-spacing:0.02em\">Section title — display/M<\u002Fdiv>\n        <div class=\"spec\">display/M · Josefin 300 · 34 / 1.15<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'Josefin Sans';font-weight:400;font-size:20px;\">Welcome to clide — headline<\u002Fdiv>\n        <div class=\"spec\">headline · Josefin 400 · 20<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'Josefin Sans';font-weight:400;font-size:14px;letter-spacing:0.04em;color:var(--text)\">TabBar · SectionTitle — title<\u002Fdiv>\n        <div class=\"spec\">title · Josefin 400 · 14<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'JetBrains Mono';font-size:12px;line-height:1.45\">clide.kernel.resolve('theme') → returns ThemeData — body<\u002Fdiv>\n        <div class=\"spec\">body · JetBrains 400 · 12 / 1.45<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'JetBrains Mono';font-size:11px;color:var(--text)\">app/lib/app.dart · 42 lines · modified 4m — small<\u002Fdiv>\n        <div class=\"spec\">small · JetBrains 400 · 11<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"sample\" style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-mute);font-weight:500\">WORKSPACE · BACKLINKS · STAGED — label<\u002Fdiv>\n        <div class=\"spec\">label · JetBrains 500 · 10 · tracking 0.1em<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ───── components ───── -->\n    <h2>Components<\u002Fh2>\n    <div class=\"secno\">04 · the pieces the shell is built from<\u002Fdiv>\n\n    <div class=\"comp-grid\">\n      <div class=\"comp\">\n        <h3>Buttons<\u002Fh3>\n        <div class=\"inner\">\n          <button class=\"btn btn-primary\">Commit<\u002Fbutton>\n          <button class=\"btn btn-ghost\">Cancel<\u002Fbutton>\n          <button class=\"btn btn-danger\">Discard<\u002Fbutton>\n          <button class=\"btn btn-disabled\">Commit<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"spec\">primary on <code>--accent<\u002Fcode> · ghost on <code>--surface<\u002Fcode> · danger on <code>--err<\u002Fcode> · 3px radius · 11px JetBrains<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"comp\">\n        <h3>Inputs<\u002Fh3>\n        <div class=\"inner\" style=\"gap: 14px\">\n          <input class=\"input\" placeholder=\"Search files…\">\n          <input class=\"input\" placeholder=\"Focused\" style=\"border-color:var(--accent)\">\n        <\u002Fdiv>\n        <div class=\"spec\">1px <code>--border<\u002Fcode> resting, <code>--accent<\u002Fcode> on focus · filled <code>--bg<\u002Fcode><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"comp\">\n        <h3>Pills &amp; Chips<\u002Fh3>\n        <div class=\"inner\">\n          <span class=\"chip-pill\">core-api<\u002Fspan>\n          <span class=\"chip-pill\">library-desk<\u002Fspan>\n          <span class=\"chip-pill\">portainer-core<\u002Fspan>\n          <span class=\"chip-pill accent\">active<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"spec\">matches the Projects row in Clide Web dashboard · neutral on <code>--surface<\u002Fcode>, accent on <code>--accent-soft<\u002Fcode><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"comp\">\n        <h3>Status badges<\u002Fh3>\n        <div class=\"inner\">\n          <span class=\"badge ok\">● connected<\u002Fspan>\n          <span class=\"badge warn\">⚠ 2 warnings<\u002Fspan>\n          <span class=\"badge err\">✕ daemon down<\u002Fspan>\n          <span class=\"badge info\">claude · thinking<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"spec\">10px · 10% tint of semantic color · round pills<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"comp\" style=\"grid-column: span 2\">\n        <h3>Tab bar<\u002Fh3>\n        <div class=\"tab-preview\">\n          <div class=\"tp-tab\">◇ Welcome<\u002Fdiv>\n          <div class=\"tp-tab\">● Editor · app.dart<\u002Fdiv>\n          <div class=\"tp-tab on\">▌ Claude<\u002Fdiv>\n          <div class=\"tp-tab\">$ Terminal<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"spec\">30px tall · 2px accent top-border marks active · sorted by <code>priority<\u002Fcode> ascending from each contribution<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"comp\" style=\"grid-column: span 2\">\n        <h3>Syntax — Dart<\u002Fh3>\n        <pre class=\"code\"><span class=\"cm\">// app.dart — top-level Clide application.<\u002Fspan>\n<span class=\"kw\">import<\u002Fspan> <span class=\"st\">'package:flutter/material.dart'<\u002Fspan><span class=\"pu\">;<\u002Fspan>\n<span class=\"kw\">import<\u002Fspan> <span class=\"st\">'kernel/kernel.dart'<\u002Fspan><span class=\"pu\">;<\u002Fspan>\n\n<span class=\"kw\">class<\u002Fspan> <span class=\"ty\">ClideApp<\u002Fspan> <span class=\"kw\">extends<\u002Fspan> <span class=\"ty\">StatelessWidget<\u002Fspan> <span class=\"pu\">{<\u002Fspan>\n  <span class=\"kw\">const<\u002Fspan> <span class=\"ty\">ClideApp<\u002Fspan><span class=\"pu\">({<\u002Fspan><span class=\"kw\">super<\u002Fspan><span class=\"pu\">.key});<\u002Fspan>\n\n  @<span class=\"ty\">override<\u002Fspan>\n  <span class=\"ty\">Widget<\u002Fspan> <span class=\"me\">build<\u002Fspan><span class=\"pu\">(<\u002Fspan><span class=\"ty\">BuildContext<\u002Fspan> ctx<span class=\"pu\">)<\u002Fspan> <span class=\"pu\">{<\u002Fspan>\n    <span class=\"kw\">final<\u002Fspan> kernel <span class=\"pu\">=<\u002Fspan> <span class=\"ty\">Kernel<\u002Fspan><span class=\"pu\">.<\u002Fspan><span class=\"me\">of<\u002Fspan><span class=\"pu\">(<\u002Fspan>ctx<span class=\"pu\">);<\u002Fspan>\n    <span class=\"kw\">return<\u002Fspan> <span class=\"ty\">MaterialApp<\u002Fspan><span class=\"pu\">(<\u002Fspan>\n      title<span class=\"pu\">:<\u002Fspan> <span class=\"st\">'clide'<\u002Fspan><span class=\"pu\">,<\u002Fspan>\n      theme<span class=\"pu\">:<\u002Fspan> kernel<span class=\"pu\">.<\u002Fspan>theme<span class=\"pu\">.<\u002Fspan><span class=\"me\">resolve<\u002Fspan><span class=\"pu\">(<\u002Fspan><span class=\"st\">'clide'<\u002Fspan><span class=\"pu\">).<\u002Fspan>data<span class=\"pu\">,<\u002Fspan>\n      home<span class=\"pu\">:<\u002Fspan> <span class=\"kw\">const<\u002Fspan> <span class=\"ty\">SlotHost<\u002Fspan><span class=\"pu\">(<\u002Fspan>preset<span class=\"pu\">:<\u002Fspan> <span class=\"ty\">Layouts<\u002Fspan><span class=\"pu\">.<\u002Fspan>classic<span class=\"pu\">),<\u002Fspan>\n    <span class=\"pu\">);<\u002Fspan>\n  <span class=\"pu\">}<\u002Fspan>\n<span class=\"pu\">}<\u002Fspan><\u002Fpre>\n        <div class=\"spec\" style=\"margin-top:10px\">7 token roles · see <code>syn-*<\u002Fcode> CSS vars · each theme redefines these<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ───── spacing / radii ───── -->\n    <h2>Spacing &amp; radii<\u002Fh2>\n    <div class=\"secno\">05 · 4-point grid; integer radii only<\u002Fdiv>\n    <div class=\"tokens-line\" style=\"margin-bottom:20px\">\n      <div class=\"tk\"><div class=\"box\" style=\"width:4px;height:28px\"><\u002Fdiv><div class=\"label\">4 · gap-xs<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:8px;height:28px\"><\u002Fdiv><div class=\"label\">8 · gap-sm<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:12px;height:28px\"><\u002Fdiv><div class=\"label\">12 · pad<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:16px;height:28px\"><\u002Fdiv><div class=\"label\">16 · gap-md<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:24px;height:28px\"><\u002Fdiv><div class=\"label\">24 · gap-lg<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:32px;height:28px\"><\u002Fdiv><div class=\"label\">32 · section<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tokens-line\">\n      <div class=\"tk\"><div class=\"box\" style=\"width:40px;height:40px;border-radius:0\"><\u002Fdiv><div class=\"label\">0 · rule<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:40px;height:40px;border-radius:2px\"><\u002Fdiv><div class=\"label\">2 · chip<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:40px;height:40px;border-radius:3px\"><\u002Fdiv><div class=\"label\">3 · input/btn<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:40px;height:40px;border-radius:4px\"><\u002Fdiv><div class=\"label\">4 · panel<\u002Fdiv><\u002Fdiv>\n      <div class=\"tk\"><div class=\"box\" style=\"width:40px;height:40px;border-radius:6px\"><\u002Fdiv><div class=\"label\">6 · frame<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ───── usage ───── -->\n    <h2>Usage<\u002Fh2>\n    <div class=\"secno\">06 · dart handoff<\u002Fdiv>\n    <div class=\"usage\">\n      <h3>In your app<\u002Fh3>\n      <pre class=\"code\"><span class=\"kw\">import<\u002Fspan> <span class=\"st\">'themes/clide_theme.dart'<\u002Fspan><span class=\"pu\">;<\u002Fspan>\n\n<span class=\"ty\">MaterialApp<\u002Fspan><span class=\"pu\">(<\u002Fspan>\n  theme<span class=\"pu\">:<\u002Fspan> <span class=\"ty\">ClideTheme<\u002Fspan><span class=\"pu\">.<\u002Fspan>data<span class=\"pu\">,<\u002Fspan>\n  home<span class=\"pu\">:<\u002Fspan> <span class=\"kw\">const<\u002Fspan> <span class=\"ty\">ClideApp<\u002Fspan><span class=\"pu\">(),<\u002Fspan>\n<span class=\"pu\">);<\u002Fspan><\u002Fpre>\n      <p style=\"color:var(--text-dim); font-size:11px; margin-top:14px\">\n        Semantic tokens (<code>surface<\u002Fcode>, <code>accent<\u002Fcode>, <code>border<\u002Fcode>…) are exposed as <code>ClideTheme.tokens<\u002Fcode> for places where a Material widget can't carry the meaning. The other three presets live in <code>midnight_theme.dart<\u002Fcode>, <code>paper_theme.dart<\u002Fcode>, <code>terminal_theme.dart<\u002Fcode> — same API, different palette.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    const THEMES = {\n      clide: { name:'Clide', brightness:'dark', subtitle:'cool near-black + periwinkle',\n        bg:'#20202C', bgSunken:'#1A1A24', surface:'#242838', surfaceHi:'#2C3046',\n        border:'#343850', borderHi:'#3C445C',\n        textHi:'#E6E8F2', text:'#B1BBE3', textDim:'#78809C', textMute:'#545C84',\n        accent:'#78A0F8', accentPress:'#6C90DC', accentSoft:'rgba(120,160,248,0.13)',\n        ok:'#7DD3A8', warn:'#E6C370', err:'#E87D7D', info:'#78A0F8',\n        synKeyword:'#C792EA', synType:'#78A0F8', synString:'#A8D99B',\n        synNumber:'#E6C370', synComment:'#545C84', synMethod:'#82B1FF', synPunct:'#78809C',\n        onAccent:'#0D1020',\n      },\n      midnight: { name:'Midnight', brightness:'dark', subtitle:'VS Code-adjacent dark',\n        bg:'#1E1E1E', bgSunken:'#181818', surface:'#252526', surfaceHi:'#2D2D2E',\n        border:'#333333', borderHi:'#3F3F3F',\n        textHi:'#D4D4D4', text:'#BBBBBB', textDim:'#858585', textMute:'#6A6A6A',\n        accent:'#569CD6', accentPress:'#4785BD', accentSoft:'rgba(86,156,214,0.13)',\n        ok:'#89D185', warn:'#D7BA7D', err:'#F48771', info:'#569CD6',\n        synKeyword:'#C586C0', synType:'#4EC9B0', synString:'#CE9178',\n        synNumber:'#B5CEA8', synComment:'#6A9955', synMethod:'#DCDCAA', synPunct:'#858585',\n        onAccent:'#0B1220',\n      },\n      paper: { name:'Paper', brightness:'light', subtitle:'drafting sheet',\n        bg:'#F4F1EA', bgSunken:'#ECE7DB', surface:'#FBF8F1', surfaceHi:'#ECE7DB',\n        border:'#1A1A1A', borderHi:'#4A4A4A',\n        textHi:'#1A1A1A', text:'#4A4A4A', textDim:'#8A8A82', textMute:'#A8A89E',\n        accent:'#C14B2A', accentPress:'#A03D20', accentSoft:'rgba(193,75,42,0.13)',\n        ok:'#2D8A52', warn:'#B88A2A', err:'#B03A2A', info:'#2A6FC1',\n        synKeyword:'#7B3F8C', synType:'#2A6FC1', synString:'#2D8A52',\n        synNumber:'#B88A2A', synComment:'#8A8A82', synMethod:'#1E5D9E', synPunct:'#4A4A4A',\n        onAccent:'#FBF8F1',\n      },\n      terminal: { name:'Terminal', brightness:'dark', subtitle:'near-black + amber',\n        bg:'#0A0A0A', bgSunken:'#000000', surface:'#111111', surfaceHi:'#181818',\n        border:'#242424', borderHi:'#2E2E2E',\n        textHi:'#E6E6E6', text:'#BDBDBD', textDim:'#7A7A7A', textMute:'#4A4A4A',\n        accent:'#E0B050', accentPress:'#C29438', accentSoft:'rgba(224,176,80,0.13)',\n        ok:'#8FDC9B', warn:'#E0B050', err:'#E05050', info:'#A3C4FF',\n        synKeyword:'#E05050', synType:'#E0B050', synString:'#8FDC9B',\n        synNumber:'#C792EA', synComment:'#4A4A4A', synMethod:'#A3C4FF', synPunct:'#7A7A7A',\n        onAccent:'#000000',\n      },\n    };\n\n    const kebab = s => s.replace(/[A-Z]/g, m => '-' + m.toLowerCase());\n    function applyTheme(id) {\n      const t = THEMES[id];\n      for (const k in t) {\n        if (typeof t[k] === 'string' && k !== 'name' && k !== 'subtitle' && k !== 'brightness') {\n          document.documentElement.style.setProperty('--' + kebab(k), t[k]);\n        }\n      }\n      document.querySelectorAll('.sw-btn').forEach(b => b.classList.toggle('on', b.dataset.t === id));\n      // light theme needs text-mute readable on swatch overlay -- handled in css\n    }\n\n    // build theme cards\n    const SW_KEYS = ['bg', 'surface', 'border', 'text', 'accent', 'ok'];\n    const cards = document.getElementById('themeCards');\n    Object.entries(THEMES).forEach(([id, t]) => {\n      const card = document.createElement('div');\n      card.className = 'theme-card' + (t.brightness === 'light' ? ' light' : '');\n      card.innerHTML = `\n        <div class=\"bar\" style=\"background:${t.bgSunken};color:${t.textHi}\">\n          ${t.name}\n          <span class=\"tag\" style=\"color:${t.textMute}\">${t.brightness}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"swatches\">\n          ${SW_KEYS.map(k => `<div style=\"background:${t[k]}\"><span>${t[k].toUpperCase()}<\u002Fspan><\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n        <div class=\"foot\" style=\"background:${t.bg};color:${t.textDim};border-top-color:${t.border}\">${t.subtitle}<\u002Fdiv>\n      `;\n      cards.appendChild(card);\n    });\n\n    // color matrix\n    const ROLES = [\n      ['Canvas',        ['bg', 'bgSunken']],\n      ['Surfaces',      ['surface', 'surfaceHi']],\n      ['Borders',       ['border', 'borderHi']],\n      ['Text',          ['textHi', 'text', 'textDim', 'textMute']],\n      ['Accent',        ['accent', 'accentPress']],\n      ['Semantic',      ['ok', 'warn', 'err', 'info']],\n      ['Syntax',        ['synKeyword', 'synType', 'synString', 'synNumber', 'synComment', 'synMethod', 'synPunct']],\n    ];\n    const mx = document.getElementById('colorMatrix');\n    mx.innerHTML = '<div class=\"h\">ROLE · TOKEN<\u002Fdiv>' + Object.keys(THEMES).map(id => `<div class=\"h\">${THEMES[id].name.toUpperCase()}<\u002Fdiv>`).join('');\n    ROLES.forEach(([group, keys]) => {\n      keys.forEach((k, i) => {\n        mx.innerHTML += `<div class=\"c lbl\">${i === 0 ? '<b style=\"color:var(--text-hi);font-weight:400\">' + group + '<\u002Fb><br>' : ''}<span style=\"color:var(--text-dim)\">${k}<\u002Fspan><\u002Fdiv>`;\n        Object.keys(THEMES).forEach(id => {\n          const v = THEMES[id][k];\n          mx.innerHTML += `<div class=\"c chip\"><span class=\"dot\" style=\"background:${v}\"><\u002Fspan><span class=\"hex\">${v}<\u002Fspan><\u002Fdiv>`;\n        });\n      });\n    });\n\n    // switcher\n    document.querySelectorAll('.sw-btn').forEach(b => b.onclick = () => applyTheme(b.dataset.t));\n    applyTheme('clide');\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
